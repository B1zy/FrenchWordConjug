<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google" content="notranslate">
<meta http-equiv="Content-Language" content="en">
<title>Conjugaison</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #c9a84c;
    --accent-dim: #7a6330;
    --text: #e8e0d0;
    --muted: #6b6560;
    --correct: #5a9e6f;
    --wrong: #c0464a;
    --correct-bg: #0f2a18;
    --wrong-bg: #2a0f10;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(201,168,76,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 640px;
    position: relative;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 48px;
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-style: italic;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .score-display {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .score-display span {
    color: var(--accent);
    font-weight: 500;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 40px;
    position: relative;
    transition: border-color 0.3s;
  }

  .card.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
  }

  .card.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
    opacity: 0.5;
  }

  .prompt-meta {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .meta-label {
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .meta-value {
    font-size: 0.85rem;
    color: var(--accent);
    font-weight: 500;
  }

  .verb-display {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1;
  }

  .verb-meaning {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 36px;
    letter-spacing: 0.05em;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .pronoun-label {
    font-size: 1rem;
    color: var(--accent);
    white-space: nowrap;
    min-width: 60px;
  }

  input[type="text"] {
    flex: 1;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    padding: 8px 4px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.03em;
  }

  input[type="text"]:focus {
    border-bottom-color: var(--accent);
  }

  input[type="text"].correct {
    border-bottom-color: var(--correct);
    color: var(--correct);
  }

  input[type="text"].wrong {
    border-bottom-color: var(--wrong);
    color: var(--wrong);
  }

  .feedback {
    margin-top: 20px;
    font-size: 0.82rem;
    min-height: 22px;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }

  .correct-answer {
    color: var(--text);
    font-weight: 500;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px 28px;
    cursor: pointer;
    transition: all 0.18s;
    margin-top: 32px;
    border-radius: 2px;
    display: block;
  }

  .btn:hover {
    background: rgba(201,168,76,0.12);
    border-color: var(--accent);
  }

  .btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    margin-top: 32px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  .streak {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 16px;
    letter-spacing: 0.08em;
  }

  .streak span { color: var(--accent); }

  .no-tenses {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 40px 0;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .shake { animation: shake 0.35s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in { animation: fadeIn 0.3s ease; }

  /* Verb picker */
  .verb-picker-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.18s;
    border-radius: 2px;
  }
  .verb-picker-btn:hover { border-color: var(--accent); color: var(--accent); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 640px;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }

  .modal-header {
    padding: 24px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .modal-title-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.2rem;
    color: var(--accent);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px;
  }
  .modal-close:hover { color: var(--text); }

  .modal-search {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    padding: 6px 2px;
    outline: none;
    width: 100%;
    letter-spacing: 0.03em;
  }
  .modal-search::placeholder { color: var(--muted); }
  .modal-search:focus { border-bottom-color: var(--accent); }

  .modal-controls { display: flex; gap: 12px; }

  .modal-ctrl-btn {
    background: none;
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    padding: 0;
    transition: color 0.15s;
  }
  .modal-ctrl-btn:hover { color: var(--accent); }

  .modal-body {
    overflow-y: auto;
    padding: 16px 28px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    align-content: start;
  }

  .verb-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 2px;
    user-select: none;
  }
  .verb-chip:hover { border-color: #444; }
  .verb-chip.selected { border-color: var(--accent-dim); background: rgba(201,168,76,0.07); }
  .verb-chip.selected .chip-inf { color: var(--accent); }

  .chip-check {
    width: 12px; height: 12px;
    border: 1px solid var(--border);
    border-radius: 2px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    transition: all 0.15s;
  }
  .verb-chip.selected .chip-check { background: var(--accent); border-color: var(--accent); color: #000; }

  .chip-inf {
    font-size: 0.78rem;
    color: var(--muted);
    transition: color 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .modal-footer {
    padding: 16px 28px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-count { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; }
  .modal-count span { color: var(--accent); }

  .modal-apply {
    background: transparent;
    border: 1px solid var(--accent-dim);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 8px 20px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.18s;
  }
  .modal-apply:hover { background: rgba(201,168,76,0.12); border-color: var(--accent); }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 40px;
    transition: opacity 0.5s ease;
  }
  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loading-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }
  .loading-status {
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-align: center;
    min-height: 1.2em;
  }
  .loading-status span { color: var(--text); }
  .loading-bar-wrap {
    width: 100%;
    max-width: 320px;
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }
  .loading-bar-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: var(--accent);
    transition: width 0.3s ease;
    width: 0%;
  }
  .loading-count {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }
  .loading-count span { color: var(--accent); }

  /* Tense filters — always horizontal scroll, never wrap */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: nowrap;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    margin-bottom: 0;
    padding-bottom: 2px;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; }

  /* ---- Mobile ---- */
  @media (max-width: 600px) {
    body {
      padding: 16px;
      justify-content: flex-start;
      padding-top: 24px;
      overflow-y: auto;
    }

    header { margin-bottom: 20px; }
    .title { font-size: 1.4rem; }
    .score-display { font-size: 0.68rem; }

    .filter-btn { font-size: 0.6rem; padding: 6px 10px; }
    .verb-picker-btn { flex-shrink: 0; font-size: 0.6rem; padding: 6px 10px; }

    .card { padding: 20px 18px; }
    .verb-display { font-size: 2rem; margin-bottom: 6px; }
    .verb-meaning { margin-bottom: 20px; font-size: 0.7rem; }
    .pronoun-label { font-size: 0.9rem; min-width: 46px; }

    /* Prevent iOS zoom on input focus */
    input[type="text"] { font-size: 16px; }

    .feedback { font-size: 0.78rem; margin-top: 14px; }

    .btn {
      width: 100%;
      text-align: center;
      padding: 14px;
      margin-top: 20px;
    }

    .progress-bar { margin-top: 20px; }

    /* Modal: bottom sheet on mobile */
    .modal-overlay { padding: 0; align-items: flex-end; }
    .modal {
      max-height: 88vh;
      border-radius: 12px 12px 0 0;
      border-left: none;
      border-right: none;
      border-bottom: none;
    }
    .modal-header { padding: 18px 16px 14px; }
    .modal-body {
      padding: 12px 16px;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    }
    .modal-footer { padding: 12px 16px; }

    .loading-title { font-size: 1.5rem; }
  }
</style>
</head>
<body>
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-title">Conjugaison</div>
  <div class="loading-status" id="loading-status">Chargement…</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar-fill" id="loading-bar-fill"></div>
  </div>
  <div class="loading-count" id="loading-count" style="visibility:hidden">—</div>
</div>

<div class="container">
  <header>
    <div class="title">Conjugaison</div>
    <div class="score-display">Score <span id="score-display">0 / 0</span></div>
  </header>

  <div style="display:flex; gap:8px; align-items:center; margin-bottom:24px;">
    <button class="verb-picker-btn" id="open-tense-picker">Temps ▾</button>
    <button class="verb-picker-btn" id="open-verb-picker">Verbes ▾</button>
  </div>

  <div class="modal-overlay" id="tense-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title-row">
          <div class="modal-title">Choisir les temps</div>
          <button class="modal-close" id="close-tense-modal">✕</button>
        </div>
        <div class="modal-controls" style="margin-top:4px;">
          <button class="modal-ctrl-btn" id="tense-all-btn">Tout sélectionner</button>
          <button class="modal-ctrl-btn" id="tense-none-btn">Tout désélectionner</button>
        </div>
      </div>
      <div class="modal-body" id="tense-chip-list" style="grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));"></div>
      <div class="modal-footer">
        <div class="modal-count"><span id="tense-selected-count">0</span> / <span id="tense-total-count">0</span> temps</div>
        <button class="modal-apply" id="apply-tenses">Appliquer →</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="verb-modal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title-row">
          <div class="modal-title">Choisir les verbes</div>
          <button class="modal-close" id="close-modal">✕</button>
        </div>
        <input class="modal-search" id="verb-search" placeholder="rechercher un verbe..." autocomplete="off" spellcheck="false">
        <div class="modal-controls">
          <button class="modal-ctrl-btn" id="select-all-btn">Tout sélectionner</button>
          <button class="modal-ctrl-btn" id="select-none-btn">Tout désélectionner</button>
        </div>
      </div>
      <div class="modal-body" id="verb-chip-list"></div>
      <div class="modal-footer">
        <div class="modal-count"><span id="selected-count">0</span> / <span id="total-count">0</span> verbes</div>
        <button class="modal-apply" id="apply-verbs">Appliquer →</button>
      </div>
    </div>
  </div>

  <div class="card fade-in" id="quiz-card">
    <div class="prompt-meta">
      <div class="meta-item">
        <div class="meta-label">Temps</div>
        <div class="meta-value" id="tense-label">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Personne</div>
        <div class="meta-value" id="person-label">—</div>
      </div>
    </div>
    <div class="verb-display" id="verb-display">—</div>
    <div class="verb-meaning" id="verb-meaning">—</div>
    <div class="input-row">
      <div class="pronoun-label" id="pronoun-label">—</div>
      <input type="text" id="answer-input" placeholder="conjuguez..." autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="btn" id="next-btn" style="display:none">Suivant →</button>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="streak" id="streak-display"></div>
  </div>
</div>

const TENSES = {
  'Présent':              { label: 'Présent' },
  'Imparfait':            { label: 'Imparfait' },
  'Passé composé':        { label: 'Passé composé' },
  'Futur simple':         { label: 'Futur simple' },
  'Plus-que-parfait':     { label: 'Plus-que-parfait' },
  'Futur proche':         { label: 'Futur proche' },
  'Subjonctif présent':   { label: 'Subjonctif présent' },
  'Subjonctif passé':     { label: 'Subjonctif passé' },
  'Conditionnel présent': { label: 'Conditionnel présent' },
  'Conditionnel passé':   { label: 'Conditionnel passé' },
};

const PERSONS = [
  { pronoun: 'je', label: '1s' },
  { pronoun: 'tu', label: '2s' },
  { pronoun: 'il/elle', label: '3s' },
  { pronoun: 'nous', label: '1p' },
  { pronoun: 'vous', label: '2p' },
  { pronoun: 'ils/elles', label: '3p' },
];

// Build VERBS list from embedded VERB_DATA
const VERBS = Object.entries(VERB_DATA).map(([inf, v]) => ({ inf, en: v.en, aux: v.aux }));

// ---- Conjugation engine — direct lookup from VERB_DATA ----

const ALLER_PRESENT = ['vais','vas','va','allons','allez','vont'];

function getConjugation(verbInf, tense, pi) {
  if (tense === 'Futur proche') {
    return ALLER_PRESENT[pi] + ' ' + verbInf;
  }
  const v = VERB_DATA[verbInf];
  if (!v) return null;
  const forms = v[tense];
  if (!forms) return null;
  return forms[pi] || null;
}

function getCachedAnswer(verbInf, tense, pi) {
  return getConjugation(verbInf, tense, pi);
}

async function prefetchAll() {
  // Instant — everything is already in VERB_DATA
  document.getElementById('loading-bar-fill').style.width = '100%';
  document.getElementById('loading-status').textContent = 'Prêt !';
  await new Promise(r => setTimeout(r, 200));
}


// ---- App State ----
const DEFAULT_TENSES = new Set(['Présent','Imparfait','Passé composé','Futur simple','Plus-que-parfait']);
let activeTenses = new Set(DEFAULT_TENSES);
let score = { correct: 0, total: 0 };
let streak = 0;
let bestStreak = 0;
let current = null;
// States: 'loading' | 'unanswered' | 'retyping' | 'done'
let state = 'loading';

function pickRandom() {
  const tenseKeys = [...activeTenses];
  const tense = tenseKeys[Math.floor(Math.random() * tenseKeys.length)];
  const pool = VERBS.filter(v => activeVerbs.has(v.inf));
  const verb = pool[Math.floor(Math.random() * pool.length)];
  const pi = Math.floor(Math.random() * 6);
  return { tense, verb, pi };
}

async function newQuestion() {
  if (activeTenses.size === 0) return;
  const { tense, verb, pi } = pickRandom();
  current = { tense, verb, pi, answer: null };

  state = 'unanswered';
  const card = document.getElementById('quiz-card');
  card.className = 'card fade-in';
  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';

  const input = document.getElementById('answer-input');
  input.value = '';
  input.className = '';
  input.disabled = false;
  input.placeholder = 'conjuguez…';

  document.getElementById('tense-label').textContent = TENSES[tense].label;
  document.getElementById('person-label').textContent = PERSONS[pi].label;
  document.getElementById('verb-display').textContent = verb.inf;

  const hints = {
    'Conditionnel présent': 'si + imparfait, …',
    'Conditionnel passé':   'si + plus-que-parfait, …',
    'Subjonctif présent':   'il faut que …',
    'Subjonctif passé':     'il faut que … (passé)',
    'Futur proche':         'aller + infinitif'
  };
  const hintEl = document.getElementById('verb-meaning');
  hintEl.innerHTML = hints[tense]
    ? `${verb.en} &nbsp;<span style="color:var(--accent-dim);font-size:0.7rem">[${hints[tense]}]</span>`
    : verb.en;

  document.getElementById('pronoun-label').textContent = PERSONS[pi].pronoun;

  // Get answer from library (synchronous)
  const answer = getCachedAnswer(verb.inf, tense, pi);
  if (answer) {
    current.answer = answer;
    input.focus();
  } else {
    input.placeholder = 'forme non trouvée — Entrée pour passer';
    state = 'done';
    document.getElementById('next-btn').style.display = 'block';
  }
}


function checkAnswer() {
  if (state !== 'unanswered' && state !== 'retyping') return;
  if (!current?.answer) return;
  const input = document.getElementById('answer-input');
  const userAns = input.value.trim().toLowerCase();
  if (!userAns) return;

  const correct = current.answer;
  const isCorrect = userAns === correct;
  const fb = document.getElementById('feedback');
  const card = document.getElementById('quiz-card');

  if (state === 'unanswered') {
    score.total++;
    if (isCorrect) {
      score.correct++;
      streak++;
      if (streak > bestStreak) bestStreak = streak;
      input.className = 'correct';
      fb.className = 'feedback correct';
      fb.textContent = '✓ correct';
      card.className = 'card correct';
      state = 'done';
      updateScore();
      document.getElementById('next-btn').style.display = 'block';
      document.getElementById('next-btn').focus();
    } else {
      streak = 0;
      updateScore();
      // Show the correct answer, then ask to retype
      input.value = '';
      input.className = 'wrong';
      fb.className = 'feedback wrong';
      fb.innerHTML = `✗ &nbsp;type <span class="correct-answer">${correct}</span> to continue`;
      card.className = 'card wrong';
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 400);
      state = 'retyping';
      input.focus();
    }
  } else if (state === 'retyping') {
    if (isCorrect) {
      input.className = 'correct';
      fb.className = 'feedback correct';
      fb.textContent = '✓ now you know';
      card.className = 'card correct';
      state = 'done';
      document.getElementById('next-btn').style.display = 'block';
      document.getElementById('next-btn').focus();
    } else {
      // Still wrong — shake and clear
      input.value = '';
      card.classList.add('shake');
      setTimeout(() => card.classList.remove('shake'), 400);
      input.focus();
    }
  }
}

function updateScore() {
  const pct = score.total > 0 ? Math.round((score.correct / score.total) * 100) : 0;
  document.getElementById('score-display').textContent = `${score.correct} / ${score.total}`;
  document.getElementById('progress-fill').style.width = pct + '%';
  const sd = document.getElementById('streak-display');
  if (streak >= 3) {
    sd.innerHTML = `Streak: <span>${streak}</span> &nbsp;· Best: <span>${bestStreak}</span>`;
  } else {
    sd.innerHTML = score.total > 0 ? `Accuracy: <span>${pct}%</span>` : '';
  }
}

// ---- Tense Picker ----
let pendingTenses = new Set(activeTenses);

function updateTenseBtn() {
  const btn = document.getElementById('open-tense-picker');
  const total = Object.keys(TENSES).length;
  btn.textContent = activeTenses.size === total ? 'Temps ▾' : `Temps (${activeTenses.size}) ▾`;
}

function renderTenseChips() {
  const list = document.getElementById('tense-chip-list');
  list.innerHTML = '';
  Object.keys(TENSES).forEach(key => {
    const chip = document.createElement('div');
    chip.className = 'verb-chip' + (pendingTenses.has(key) ? ' selected' : '');
    chip.innerHTML = `<div class="chip-check">${pendingTenses.has(key) ? '✓' : ''}</div><div class="chip-inf">${TENSES[key].label}</div>`;
    chip.addEventListener('click', () => {
      if (pendingTenses.has(key)) {
        if (pendingTenses.size === 1) return;
        pendingTenses.delete(key);
        chip.classList.remove('selected');
        chip.querySelector('.chip-check').textContent = '';
      } else {
        pendingTenses.add(key);
        chip.classList.add('selected');
        chip.querySelector('.chip-check').textContent = '✓';
      }
      document.getElementById('tense-selected-count').textContent = pendingTenses.size;
    });
    list.appendChild(chip);
  });
  document.getElementById('tense-total-count').textContent = Object.keys(TENSES).length;
  document.getElementById('tense-selected-count').textContent = pendingTenses.size;
}

function openTensePicker() {
  pendingTenses = new Set(activeTenses);
  renderTenseChips();
  document.getElementById('tense-modal').classList.add('open');
}

function closeTensePicker() {
  document.getElementById('tense-modal').classList.remove('open');
}

document.getElementById('open-tense-picker').addEventListener('click', openTensePicker);
document.getElementById('close-tense-modal').addEventListener('click', closeTensePicker);
document.getElementById('tense-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('tense-modal')) closeTensePicker();
});

document.getElementById('tense-all-btn').addEventListener('click', () => {
  Object.keys(TENSES).forEach(k => pendingTenses.add(k));
  renderTenseChips();
});

document.getElementById('tense-none-btn').addEventListener('click', () => {
  const keys = Object.keys(TENSES);
  keys.forEach(k => { if (pendingTenses.size > 1) pendingTenses.delete(k); });
  renderTenseChips();
});

document.getElementById('apply-tenses').addEventListener('click', () => {
  activeTenses = new Set(pendingTenses);
  closeTensePicker();
  updateTenseBtn();
  newQuestion();
});

updateTenseBtn();

// Events
document.getElementById('answer-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (state === 'done') {
      document.getElementById('next-btn').textContent = 'Suivant →';
      newQuestion();
    } else if (state === 'unanswered' || state === 'retyping') {
      checkAnswer();
    }
    // state === 'loading': do nothing
  }
});

document.getElementById('next-btn').addEventListener('click', newQuestion);

// ---- Verb Picker ----
let activeVerbs = new Set(VERBS.map(v => v.inf)); // all on by default
let pendingVerbs = new Set(activeVerbs); // selection in modal before apply

function openVerbPicker() {
  pendingVerbs = new Set(activeVerbs);
  renderChips(document.getElementById('verb-search').value);
  document.getElementById('verb-modal').classList.add('open');
  document.getElementById('verb-search').focus();
}

function closeVerbPicker() {
  document.getElementById('verb-modal').classList.remove('open');
  document.getElementById('verb-search').value = '';
}

function renderChips(filter) {
  const list = document.getElementById('verb-chip-list');
  list.innerHTML = '';
  const q = filter.trim().toLowerCase();
  const visible = VERBS.filter(v => !q || v.inf.includes(q) || v.en.includes(q));
  visible.forEach(v => {
    const chip = document.createElement('div');
    chip.className = 'verb-chip' + (pendingVerbs.has(v.inf) ? ' selected' : '');
    chip.innerHTML = `<div class="chip-check">${pendingVerbs.has(v.inf) ? '✓' : ''}</div><div class="chip-inf">${v.inf}</div>`;
    chip.addEventListener('click', () => {
      if (pendingVerbs.has(v.inf)) {
        if (pendingVerbs.size === 1) return;
        pendingVerbs.delete(v.inf);
        chip.classList.remove('selected');
        chip.querySelector('.chip-check').textContent = '';
      } else {
        pendingVerbs.add(v.inf);
        chip.classList.add('selected');
        chip.querySelector('.chip-check').textContent = '✓';
      }
      updateModalCount();
    });
    list.appendChild(chip);
  });
  document.getElementById('total-count').textContent = VERBS.length;
  updateModalCount();
}

function updateModalCount() {
  document.getElementById('selected-count').textContent = pendingVerbs.size;
}

document.getElementById('open-verb-picker').addEventListener('click', openVerbPicker);
document.getElementById('close-modal').addEventListener('click', closeVerbPicker);
document.getElementById('verb-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('verb-modal')) closeVerbPicker();
});

document.getElementById('verb-search').addEventListener('input', e => {
  renderChips(e.target.value);
});

document.getElementById('select-all-btn').addEventListener('click', () => {
  const q = document.getElementById('verb-search').value.trim().toLowerCase();
  VERBS.filter(v => !q || v.inf.includes(q) || v.en.includes(q))
       .forEach(v => pendingVerbs.add(v.inf));
  renderChips(q);
});

document.getElementById('select-none-btn').addEventListener('click', () => {
  const q = document.getElementById('verb-search').value.trim().toLowerCase();
  const visible = VERBS.filter(v => !q || v.inf.includes(q) || v.en.includes(q));
  // keep at least one verb selected total
  visible.forEach(v => {
    if (pendingVerbs.size > 1) pendingVerbs.delete(v.inf);
  });
  renderChips(q);
});

document.getElementById('apply-verbs').addEventListener('click', () => {
  activeVerbs = new Set(pendingVerbs);
  closeVerbPicker();
  // update button label
  const btn = document.getElementById('open-verb-picker');
  btn.textContent = activeVerbs.size === VERBS.length ? 'Verbes ▾' : `Verbes (${activeVerbs.size}) ▾`;
  newQuestion();
});

// Start
(async () => {
  await prefetchAll();
  const overlay = document.getElementById('loading-overlay');
  overlay.classList.add('hidden');
  setTimeout(() => overlay.style.display = 'none', 500);
  newQuestion();
  updateScore();
})();
</script>
